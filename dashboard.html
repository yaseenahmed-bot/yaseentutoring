<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor dashboard — Yaseen Tutoring</title>
<!--
  dashboard.html — the TUTOR page. STANDALONE (build-standards §9 / Week-5 sign-off 3):
  it never imports renderer.html, platform.js, build-app.js or bundle.js, and shares
  only config.js. The student renderer and this page evolve independently.

  It talks to Supabase with the SAME anon key every page ships (config.js). It holds
  NO service_role key — the one action that needs admin rights (password reset) is a
  fetch to an Edge Function that holds the key as a server secret. check-page.js's
  DASHBOARD layer fails the build if a service_role string ever appears here.

  Everything it can do, RLS already allows a tutor to do (rls.sql): read cohort_pace,
  read/accept/deny submissions, tick/untick progress within not_started/done. The page
  cannot grant itself anything the database does not already permit.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f9; --card:#ffffff; --ink:#1c2230; --muted:#5b6577; --line:#e6e9ef;
  --teal:#0f9d8f; --teal-ink:#0a6f66; --teal-soft:#e5f5f2;
  --indigo:#4f46e5; --indigo-soft:#ecebfb; --amber:#d98a00; --amber-soft:#fbf1dc;
  --red:#d14343; --red-soft:#fdecec; --red-ink:#a32222;
  --shadow:0 1px 2px rgba(20,30,50,.05),0 8px 24px rgba(20,30,50,.05); --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.5;
     -webkit-font-smoothing:antialiased;padding:24px}
.wrap{max-width:1000px;margin:0 auto}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.kicker{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal-ink);font-weight:600}
h1{font-family:"Space Grotesk",sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin:2px 0 0}
a.signout{font-size:13px;color:var(--muted);cursor:pointer;text-decoration:none;font-weight:600}
a.signout:hover{color:var(--red-ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);border-top:3px solid var(--teal);overflow:hidden}
.student{border-bottom:8px solid var(--bg)}
.student:last-child{border-bottom:none}
.student-hd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;background:var(--teal-soft);flex-wrap:wrap}
.student-hd .nm{font-weight:700;font-size:15px}
.student-hd .nm small{display:block;color:var(--muted);font-weight:400;font-size:12px}
.hd-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.subj-head,.trow{display:grid;grid-template-columns:1.6fr .9fr .7fr .6fr .9fr;gap:10px;align-items:center;padding:10px 16px}
.subj-head{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:600}
.trow{border-bottom:1px solid var(--line);cursor:pointer;font-size:14px}
.trow:last-child{border-bottom:none}
.trow:hover{background:#fbfcfe}
.trow.open{background:#eef7f5}
.nm{font-weight:600}
.nm small{display:block;color:var(--muted);font-weight:400;font-size:12px}
.rate{font-family:"IBM Plex Mono",monospace;font-weight:600}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--indigo-soft);color:var(--indigo)}
.badge.warn{background:var(--amber-soft);color:var(--amber)}
.badge.none{background:var(--line);color:var(--muted)}
.panel{padding:0 16px;background:#fafbfd;border-bottom:1px solid var(--line)}
.panel.hidden{display:none}
.panel-in{padding:16px 0}
.sec{margin-bottom:18px}
.sec h3{font-family:"Space Grotesk",sans-serif;font-size:14px;margin:0 0 8px;letter-spacing:-.01em}
.sec h3 .c{color:var(--muted);font-weight:500}
.item{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:7px;font-size:13px}
.item .body{flex:1;min-width:0}
.item .tid{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--teal-ink);font-weight:600}
.item .spec-ref{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em}
.item .ttext{color:var(--ink);margin-top:3px;font-size:13.5px;line-height:1.45}
.item .ttext a{color:var(--indigo);text-decoration:underline}
.item .ttext b,.item .ttext strong{font-weight:600}
.item .spec{color:var(--ink);margin-top:1px}
.item .st{font-size:11px;color:var(--muted);margin-top:2px}
.item .st.note{color:var(--amber);font-style:italic}
.acts{display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end;max-width:270px}
button{font-family:inherit;font-size:12px;font-weight:600;border-radius:8px;padding:6px 11px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink)}
button:hover{border-color:var(--muted)}
button.ok{background:var(--teal);color:#fff;border-color:var(--teal)}
button.ok:hover{background:var(--teal-ink)}
button.no{background:#fff;color:var(--red-ink);border-color:#f0c4c4}
button.no:hover{background:var(--red-soft)}
button.ghost{background:#fff;color:var(--muted)}
button.danger{background:#fff;color:var(--red-ink);border-color:#f0c4c4}
button.danger:hover{background:var(--red-soft);border-color:var(--red-ink)}
button:disabled{opacity:.5;cursor:default}
.mgmt{padding:0;overflow:hidden}
.mgmt-hd{font-weight:700;font-size:13px;padding:12px 16px;background:var(--amber-soft);color:var(--amber);border-bottom:1px solid var(--line)}
.mrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.mrow:last-child{border-bottom:none}
.pick{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
select.planpick{font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe;color:var(--ink);max-width:190px}
.planmgmt{border:1px dashed var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;background:#fbfcfe}
.pm-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:6px}
input.note{font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;width:150px;background:#fbfcfe}
input.filter{font-family:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;width:100%;background:#fbfcfe;margin-bottom:9px}
.taskscroll{max-height:56vh;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fafbfd}
.taskscroll::-webkit-scrollbar{width:10px}
.taskscroll::-webkit-scrollbar-thumb{background:#d6dbe4;border-radius:6px;border:2px solid #fafbfd}
.disabled-tag{font-size:11px;color:var(--muted)}
.pw{font-family:"IBM Plex Mono",monospace;font-size:14px;background:var(--amber-soft);border:1px solid #ead9ae;color:#7a5200;padding:8px 11px;border-radius:9px;display:inline-block;margin-top:6px;user-select:all}
.empty{color:var(--muted);font-size:13px;padding:6px 2px}
.flash{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:9px 15px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;z-index:9;pointer-events:none}
.flash.on{opacity:1}
.flash.bad{background:var(--red-ink)}
.loading{padding:40px;text-align:center;color:var(--muted)}
.tasks-more{font-size:12px;color:var(--teal-ink);cursor:pointer;font-weight:600;padding:4px 2px}
@media (max-width:720px){
  .subj-head{display:none}
  .trow{grid-template-columns:1fr auto;gap:4px 10px}
  .trow>.dl{grid-column:1;color:var(--muted);font-size:12px}
  .acts{max-width:none}
  .student-hd{align-items:flex-start}
}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">Yaseen Tutoring</div>
      <h1>Tutor dashboard</h1>
    </div>
    <a class="signout" id="signout">Sign out</a>
  </header>
  <div id="root"><div class="loading card">Loading your cohort…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(window.__SUPA__.url, window.__SUPA__.anonKey);
const RESET_URL = window.__SUPA__.url + "/functions/v1/reset-password";
const $ = id => document.getElementById(id);
let ME = null;                 // tutor's own auth id (reviewed_by)
let SESSION = null;
const open = {};               // assignment_id -> expanded?
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function flash(msg, bad){ const f=$("flash"); f.textContent=msg; f.className="flash on"+(bad?" bad":""); setTimeout(()=>f.className="flash",2200); }

// slug -> human label, e.g. aqa-bio-as -> "AQA Biology · AS"
function planLabel(slug){
  const B={aqa:"AQA",ocr:"OCR",edexcel:"Edexcel"}, S={bio:"Biology",chem:"Chemistry",maths:"Maths"}, L={as:"AS",al:"A-level"};
  const p=(slug||"").split("-"); return `${B[p[0]]||p[0]} ${S[p[1]]||p[1]} · ${L[p[2]]||p[2]}`;
}
const fdate = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"}) : "—";

// ---- guard: must be a signed-in TUTOR --------------------------------------
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href = "index.html"; return; }
  SESSION = session; ME = session.user.id;
  const { data: prof, error } = await sb.from("users").select("role").eq("id", ME).single();
  if (error || !prof || prof.role !== "tutor"){ location.href = "app.html"; return; }  // students never see this page
  loadCohort();
})();

$("signout").onclick = async () => { await sb.auth.signOut(); location.href = "index.html"; };

// ---- cohort overview + student/plan management -----------------------------
let PLANS = [], NAMES = {};
function planSelect(id, excludeSlugs){
  const opts = PLANS.filter(p => !excludeSlugs.includes(p.slug))
    .map(p => `<option value="${esc(p.id)}">${esc(p.label)}</option>`).join("");
  return opts ? `<select class="planpick" id="${id}">${opts}</select>` : `<span class="c">no other plans</span>`;
}

async function loadCohort(){
  const [pace, usersR, plansR, pend] = await Promise.all([
    sb.from("cohort_pace").select("*"),
    sb.from("users").select("id,full_name,email,left_on").eq("role","student"),
    sb.from("plans").select("id,slug").order("slug"),
    sb.rpc("pending_signups")
  ]);
  if (pace.error){ $("root").innerHTML = `<div class="loading card">Couldn't load the cohort: ${esc(pace.error.message)}</div>`; return; }
  PLANS = (plansR.data||[]).map(p => ({ id:p.id, slug:p.slug, label:planLabel(p.slug) }));
  const data = pace.data || [];
  NAMES = {}; (usersR.data||[]).forEach(u => NAMES[u.id] = u.full_name || u.email || "this student");

  // Group cohort_pace rows by student (a 3-subject student is ONE block).
  const byStudent = new Map();
  for (const r of data){
    if (!byStudent.has(r.user_id)) byStudent.set(r.user_id, { user_id:r.user_id, name:r.full_name, email:r.email, rows:[] });
    byStudent.get(r.user_id).rows.push(r);
  }
  const leftOf = {}; (usersR.data||[]).forEach(u => leftOf[u.id] = u.left_on);
  const withPlan = new Set(data.map(r => r.user_id));
  const noPlan  = (usersR.data||[]).filter(u => !withPlan.has(u.id));      // approved, unassigned
  const pending = pend.error ? [] : (pend.data || []);                      // signed up, unapproved

  const rateOf = r => (r.tasks_per_week == null ? -1 : Number(r.tasks_per_week));
  const subjSort = (a,b) => {
    const ra=a.tasks_per_week, rb=b.tasks_per_week;
    if (ra==null && rb==null) return (a.plan_slug||"").localeCompare(b.plan_slug||"");
    if (ra==null) return 1; if (rb==null) return -1; return rb - ra;
  };
  const students = [...byStudent.values()];
  students.forEach(s => { s.rows.sort(subjSort); s.worst = Math.max(...s.rows.map(rateOf)); });
  students.sort((x,y) => {
    if (x.worst < 0 && y.worst < 0) return (x.name||"").localeCompare(y.name||"");
    if (x.worst < 0) return 1; if (y.worst < 0) return -1;
    return y.worst - x.worst;
  });

  // -- waiting for approval --
  const pendCard = pending.length ? `<div class="card mgmt">
    <div class="mgmt-hd">Waiting for approval <span class="c">— ${pending.length}</span></div>
    ${pending.map(p => `<div class="mrow">
      <div class="nm">${esc(p.full_name||p.email)}<small>${esc(p.email)}</small></div>
      <button class="ok" data-approve="${esc(p.id)}">Approve</button>
    </div>`).join("")}</div>` : ``;

  // -- approved, no plan yet --
  const noPlanCard = noPlan.length ? `<div class="card mgmt">
    <div class="mgmt-hd">Approved — no plan yet <span class="c">— ${noPlan.length}</span></div>
    ${noPlan.map(u => `<div class="mrow">
      <div class="nm">${esc(u.full_name||"—")}<small>${esc(u.email||"")}</small></div>
      <span class="pick">${planSelect("add-"+u.id, [])}<button class="ok" data-assign="${esc(u.id)}" data-pick="add-${esc(u.id)}">Assign plan</button></span>
    </div>`).join("")}</div>` : ``;

  // -- active students --
  const blocks = students.map(s => {
    const heldSlugs = s.rows.map(r => r.plan_slug);
    const left = leftOf[s.user_id];
    const leftFlag = left ? `<span class="badge warn" title="deletes ~6 months after ${fdate(left)}">leaving</span>` : ``;
    const leaveBtn = left
      ? `<button class="ghost" data-reinstate="${esc(s.user_id)}">Reinstate</button>`
      : `<button class="ghost" data-left="${esc(s.user_id)}">Mark left</button>`;
    const worstBadge = s.worst < 0
      ? `<span class="badge none">not yet paced</span>`
      : `<span class="rate">${s.worst}</span><span class="c">/wk on the subject they're furthest behind on</span>`;
    const subjectRows = s.rows.map(r => {
      const rate = r.tasks_per_week==null
        ? `<span class="badge none">not yet paced</span>`
        : `<span class="rate">${r.tasks_per_week}</span><span class="c">/wk</span>`;
      const flag = r.floor_breached ? `<span class="badge warn" title="${esc(r.message||'behind the late-joiner floor')}">⚠ floor</span>` : ``;
      return `<div class="trow" data-a="${r.assignment_id}" data-p="${r.plan_id}" data-uid="${esc(s.user_id)}" data-slug="${esc(r.plan_slug)}">
        <div class="plan">${esc(planLabel(r.plan_slug))}</div>
        <div class="dl">${fdate(r.deadline)}</div>
        <div>${r.remaining==null?"—":r.remaining}</div>
        <div>${r.weeks_left==null?"—":r.weeks_left}</div>
        <div>${rate} ${flag}</div>
      </div>
      <div class="panel hidden" id="panel-${r.assignment_id}"><div class="panel-in"></div></div>`;
    }).join("");
    return `<div class="student">
      <div class="student-hd">
        <div class="nm">${esc(s.name||"—")}<small>${esc(s.email||"")}</small> ${leftFlag}</div>
        <div class="hd-right">${worstBadge}
          <span class="pick">${planSelect("addp-"+s.user_id, heldSlugs)}<button class="ghost" data-assign="${esc(s.user_id)}" data-pick="addp-${esc(s.user_id)}">Add plan</button></span>
          <button class="ghost" id="rst-${s.user_id}">Reset password</button>
          ${leaveBtn}
          <button class="danger" data-delete="${esc(s.user_id)}">Delete</button>
          <span id="rstout-${s.user_id}"></span></div>
      </div>
      <div class="subj-head"><div>Plan</div><div>Deadline</div><div>Left</div><div>Wks</div><div>Tasks/wk</div></div>
      ${subjectRows}
    </div>`;
  }).join("");

  const activeCard = blocks ? `<div class="card">${blocks}</div>` : ``;
  const emptyMsg = (!pending.length && !noPlan.length && !blocks) ? `<div class="loading card">No students yet. Signups will appear here to approve.</div>` : ``;
  $("root").innerHTML = pendCard + noPlanCard + activeCard + emptyMsg;

  document.querySelectorAll(".trow").forEach(row => row.onclick = (e) => { if (!e.target.closest("button,select")) toggle(row); });
  students.forEach(s => { const b=$("rst-"+s.user_id); if(b) b.onclick=()=>resetPassword(s.user_id,s.name); });
  wireMgmt();
}

function wireMgmt(){
  document.querySelectorAll("[data-approve]").forEach(b => b.onclick = () => rpcAction("approve_student", { p_user_id: b.dataset.approve }));
  document.querySelectorAll("[data-assign]").forEach(b => b.onclick = () => {
    const sel = $(b.dataset.pick);
    if (!sel || sel.tagName!=="SELECT" || !sel.value){ flash("Pick a plan first", true); return; }
    rpcAction("assign_plan", { p_user_id: b.dataset.assign, p_plan_id: sel.value });
  });
  document.querySelectorAll("[data-reinstate]").forEach(b => b.onclick = () => rpcAction("reinstate_student", { p_user_id: b.dataset.reinstate }));
  document.querySelectorAll("[data-left]").forEach(b => b.onclick = () => {
    const uid = b.dataset.left;
    if (!confirm(`Mark ${NAMES[uid]||"this student"} as left?\n\nTheir account and data are kept for 6 months, then deleted. You can undo this any time before then.`)) return;
    rpcAction("mark_student_left", { p_user_id: uid });
  });
  document.querySelectorAll("[data-delete]").forEach(b => b.onclick = () => {
    const uid = b.dataset.delete, nm = NAMES[uid] || "this student";
    const typed = prompt(`This ERASES ${nm} and ALL their data now — account, progress, and any files. It cannot be undone.\n\nType DELETE to confirm.`);
    if (typed === null) return;
    if (typed !== "DELETE"){ flash("Not deleted — you didn't type DELETE", true); return; }
    rpcAction("delete_student", { p_user_id: uid });
  });
}

// One guarded RPC + refresh. Every management action returns a human message.
async function rpcAction(fn, args){
  const { data, error } = await sb.rpc(fn, args);
  if (error){ flash(error.message, true); return; }
  flash(typeof data === "string" ? data : "Done");
  loadCohort();
}

// change plan = assign the new one, then remove the old (this order means a
// failure leaves the student with BOTH, never neither).
async function changePlan(aid, uid, oldSlug){
  const sel = $("chg-"+aid);
  if (!sel || sel.tagName!=="SELECT" || !sel.value){ flash("Pick the new plan first", true); return; }
  const newLabel = (PLANS.find(p=>p.id===sel.value)||{}).label || "the new plan";
  const name = NAMES[uid] || "this student";
  if (!confirm(`Change ${name} from ${planLabel(oldSlug)} to ${newLabel}?\n\nTheir ${planLabel(oldSlug)} progress is deleted — a plan change is a fresh start.`)) return;
  let r = await sb.rpc("assign_plan", { p_user_id: uid, p_plan_id: sel.value });
  if (r.error){ flash(r.error.message, true); return; }
  r = await sb.rpc("remove_plan", { p_assignment_id: aid });
  if (r.error){ flash(r.error.message, true); return; }
  flash(`${name} changed to ${newLabel}`); loadCohort();
}
async function removePlan(aid, uid, slug){
  const name = NAMES[uid] || "this student";
  if (!confirm(`Remove ${planLabel(slug)} from ${name}?\n\nTheir progress on it is deleted and cannot be recovered.`)) return;
  const { data, error } = await sb.rpc("remove_plan", { p_assignment_id: aid });
  if (error){ flash(error.message, true); return; }
  flash(typeof data === "string" ? data : "Removed"); loadCohort();
}

function toggle(row){
  const aid = row.dataset.a, panel = $("panel-"+aid);
  const now = panel.classList.contains("hidden");
  panel.classList.toggle("hidden");
  row.classList.toggle("open", now);
  if (now && !panel.dataset.loaded){ panel.dataset.loaded = "1"; loadPanel(aid, row.dataset.p); }
}

// Walk the plan JSON and collect every task's authored wording (the `t` field).
// The projection table (plan_tasks) only carries the spec code, so the actual
// "what to do" text has to come from the plan itself — the same text the student sees.
function flattenTaskText(node, map){
  if (Array.isArray(node)) { for (const n of node) flattenTaskText(n, map); }
  else if (node && typeof node === "object"){
    if (typeof node.id === "string" && typeof node.t === "string") map[node.id] = node.t;
    for (const k in node) flattenTaskText(node[k], map);
  }
  return map;
}
const stripHtml = s => (s||"").replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();

// ---- per-subject panel: submissions · tasks (reset lives in the student header) --
async function loadPanel(aid, pid){
  const el = $("panel-"+aid).querySelector(".panel-in");
  el.innerHTML = `<div class="empty">Loading…</div>`;

  const [subs, prog, tasks, plan] = await Promise.all([
    sb.from("submissions").select("task_id,status,file_path,tutor_note").eq("assignment_id", aid),
    sb.from("progress").select("task_id,status,tutor_note").eq("assignment_id", aid),
    sb.from("plan_tasks").select("task_id,kind,phase,year,spec,requires_upload,ord").eq("plan_id", pid).order("ord"),
    sb.from("plans").select("data").eq("id", pid).single()
  ]);
  if (subs.error || prog.error || tasks.error || plan.error){
    el.innerHTML = `<div class="empty">Couldn't load: ${esc((subs.error||prog.error||tasks.error||plan.error).message)}</div>`; return;
  }
  const statusOf = {}; (prog.data||[]).forEach(p => statusOf[p.task_id] = p);
  const textById = flattenTaskText(plan.data?.data ?? plan.data ?? {}, {});
  const pending = (subs.data||[]).filter(s => s.status === "submitted");

  // the trow carries the student + plan slug this panel belongs to
  const trow = document.querySelector('.trow[data-a="'+CSS.escape(aid)+'"]');
  const uid = trow?.dataset.uid, slug = trow?.dataset.slug || "";

  el.innerHTML = `
    <div class="sec planmgmt">
      <h3>This plan <span class="c">— ${esc(planLabel(slug))}</span></h3>
      <div class="pm-row">
        <span class="pick">Change to ${planSelect("chg-"+aid, [slug])}<button class="ghost" id="chgbtn-${aid}">Change</button></span>
        <button class="danger" id="rmbtn-${aid}">Remove plan</button>
      </div>
    </div>
    <div class="sec" id="subs-${aid}">
      <h3>Submissions to review <span class="c">— ${pending.length} pending</span></h3>
      ${pending.length ? pending.map(s => subItem(aid, s, textById[s.task_id])).join("") : `<div class="empty">Nothing waiting.</div>`}
    </div>
    <div class="sec">
      <h3>Tasks <span class="c">— tick / untick · <span id="tcount-${aid}"></span></span></h3>
      <input class="filter" id="flt-${aid}" placeholder="Filter by wording, task id or spec…">
      <div id="tasks-${aid}" class="taskscroll"></div>
    </div>`;

  // plan management
  { const rm = $("rmbtn-"+aid); if (rm) rm.onclick = () => removePlan(aid, uid, slug);
    const cg = $("chgbtn-"+aid); if (cg) cg.onclick = () => changePlan(aid, uid, slug); }

  // submission accept / deny
  pending.forEach(s => wireSub(aid, s.task_id));

  // task list (render a slice, filterable; keeps 600-task plans responsive).
  // Each task carries its authored wording (text) + a plain version for filtering.
  const all = (tasks.data||[]).map(t => {
    const text = textById[t.task_id] || "";
    return { ...t, text, plain: stripHtml(text),
             st: (statusOf[t.task_id]||{}).status || "not_started",
             note:(statusOf[t.task_id]||{}).tutor_note };
  });
  renderTasks(aid, pid, all);
}

function subItem(aid, s, text){
  return `<div class="item" data-sub="${esc(s.task_id)}">
    <div class="body">
      <div class="tid">${esc(s.task_id)}</div>
      <div class="ttext">${text || "<span class='spec-ref'>(task not in plan)</span>"}</div>
      ${s.file_path ? `<div class="st">📎 submitted a file</div>` : `<div class="st">sent in for review</div>`}
    </div>
    <div class="acts">
      <input class="note" id="sn-${aid}-${cssid(s.task_id)}" placeholder="note (optional)">
      <button class="ok"  id="sa-${aid}-${cssid(s.task_id)}">Accept</button>
      <button class="no"  id="sd-${aid}-${cssid(s.task_id)}">Deny</button>
    </div></div>`;
}
const cssid = s => String(s).replace(/[^a-zA-Z0-9_-]/g,"_");

function wireSub(aid, tid){
  const review = async (status) => {
    const note = $(`sn-${aid}-${cssid(tid)}`).value.trim();
    const { error } = await sb.from("submissions")
      .update({ status, reviewed_at: new Date().toISOString(), reviewed_by: ME, tutor_note: note || null })
      .eq("assignment_id", aid).eq("task_id", tid).eq("status","submitted");
    if (error){ flash(error.message, true); return; }
    // the submissions_sync_progress trigger has moved progress to verified/denied.
    $(`sa-${aid}-${cssid(tid)}`).disabled = true; $(`sd-${aid}-${cssid(tid)}`).disabled = true;
    const item = document.querySelector(`#subs-${aid} .item[data-sub="${cssTidSel(tid)}"]`);
    if (item) item.querySelector(".acts").innerHTML = `<span class="disabled-tag">${status==="verified"?"✓ accepted":"✕ denied"}</span>`;
    flash(status==="verified" ? "Accepted" : "Denied — the student sees why");
  };
  $(`sa-${aid}-${cssid(tid)}`).onclick = () => review("verified");
  $(`sd-${aid}-${cssid(tid)}`).onclick = () => review("denied");
}
const cssTidSel = s => String(s).replace(/(["\\])/g,"\\$1");

function renderTasks(aid, pid, all){
  const box = $("tasks-"+aid);
  const draw = () => {
    const flt = ($("flt-"+aid).value||"").toLowerCase();
    const filtered = all.filter(t => !flt || t.task_id.toLowerCase().includes(flt) || (t.spec||"").toLowerCase().includes(flt) || (t.plain||"").toLowerCase().includes(flt));
    const cnt = $("tcount-"+aid); if (cnt) cnt.textContent = `${filtered.length} task${filtered.length===1?"":"s"}`;
    // The whole (filtered) list renders into a scroll window — no "load more".
    // One delegated click handler (below) keeps this cheap even at 600 tasks.
    box.innerHTML = filtered.length ? filtered.map(t => taskItem(aid, t)).join("") : `<div class="empty">No tasks match.</div>`;
  };
  draw();
  $("flt-"+aid).oninput = draw;

  // Delegated: one listener on the scroll box, not one per task. Reads the button's
  // data-act / data-tid and the sibling note input, then writes progress.
  box.onclick = async (e) => {
    const btn = e.target.closest("button[data-act]"); if (!btn) return;
    const tid = btn.dataset.tid, act = btn.dataset.act;
    const noteEl = box.querySelector(`input[data-note="${CSS.escape(tid)}"]`);
    const note = (noteEl && noteEl.value || "").trim();
    btn.disabled = true;
    const o = all.find(x => x.task_id === tid);
    if (act === "untick"){
      const { error } = await sb.from("progress")
        .update({ status:"not_started", tutor_note: note||null, updated_at:new Date().toISOString() })
        .eq("assignment_id", aid).eq("task_id", tid);
      if (error){ flash(error.message, true); btn.disabled=false; return; }
      if (o){ o.st="not_started"; o.note=note||null; }
      flash("Unticked — it re-enters the plan at Monday's re-pace"); draw();
    } else if (act === "tick"){
      const { error } = await sb.from("progress")
        .upsert({ assignment_id: aid, plan_id: pid, task_id: tid, status:"done", tutor_note: note||null, updated_at:new Date().toISOString() },
                { onConflict: "assignment_id,task_id" });
      if (error){ flash(error.message, true); btn.disabled=false; return; }
      if (o){ o.st="done"; o.note=note||null; }
      flash("Ticked"); draw();
    }
  };
}

function taskItem(aid, t){
  const kindBadge = `<span class="badge none">${esc(t.kind)}</span>`;
  const tid = esc(t.task_id);
  let action, st;
  if (t.st === "done"){
    st = `done ✓`;
    action = `<input class="note" data-note="${tid}" placeholder="reason (optional)"><button class="no" data-act="untick" data-tid="${tid}">Untick</button>`;
  } else if (t.st === "verified"){
    st = `verified ✓`;
    action = `<span class="disabled-tag">verified — remove via the submission (deny), not here</span>`;
  } else if (t.st === "submitted"){
    st = `submitted`;
    action = `<span class="disabled-tag">awaiting your review above</span>`;
  } else { // not_started or denied
    st = t.st === "denied" ? `denied` : `not done`;
    action = `<input class="note" data-note="${tid}" placeholder="reason (optional)"><button class="ok" data-act="tick" data-tid="${tid}">Tick</button>`;
  }
  // A note is a "please revisit" — only meaningful while the task is still
  // outstanding. Once it's done/verified the ask is resolved, so don't show a
  // stale note under a ticked task (the student's re-tick also clears it in the DB).
  const noteLine = (t.note && (t.st === "not_started" || t.st === "denied")) ? `<div class="st note">note: ${esc(t.note)}</div>` : ``;
  const wording = t.text || `<span class="spec-ref">(no wording found)</span>`;
  return `<div class="item">
    <div class="body">
      <div class="tid">${tid} ${kindBadge} <span class="spec-ref">${esc(t.spec)}</span></div>
      <div class="ttext">${wording}</div>
      <div class="st">${st}</div>${noteLine}
    </div>
    <div class="acts">${action}</div></div>`;
}

// ---- password reset (via Edge Function; no admin key in the browser) --------
async function resetPassword(uid, name){
  const btn = $("rst-"+uid), out = $("rstout-"+uid);
  if (!confirm(`Reset ${name}'s password? They'll need the new one to sign in, and will be asked to set their own on next login.`)) return;
  btn.disabled = true; out.textContent = " working…";
  try {
    const res = await fetch(RESET_URL, {
      method:"POST",
      headers:{ "Authorization":"Bearer "+SESSION.access_token, "Content-Type":"application/json" },
      body: JSON.stringify({ user_id: uid })
    });
    const body = await res.json().catch(()=> ({}));
    if (!res.ok) throw new Error(body.error || ("reset failed ("+res.status+")"));
    out.innerHTML = ` <span class="pw">${esc(body.password)}</span> <span class="disabled-tag">— read this to ${esc(name)}; they set their own on next login</span>`;
  } catch(e){ out.innerHTML = ` <span class="disabled-tag" style="color:var(--red-ink)">${esc(e.message)}</span>`; }
  finally { btn.disabled = false; }
}
